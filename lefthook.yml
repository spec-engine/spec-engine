# https://lefthook.dev — git hooks, installed via `lefthook install` (runs on `bun install`)
pre-commit:
  parallel: true
  jobs:
    - name: biome
      glob: "*.{ts,tsx,js,jsx,json,jsonc,css}"
      run: bunx biome check --write --no-errors-on-unmatched --files-ignore-unknown=true {staged_files}
      stage_fixed: true

pre-push:
  parallel: false
  jobs:
    - name: typecheck
      run: bun run typecheck
    - name: test
      run: bun test
